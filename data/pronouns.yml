words:
  - text: اَلَّذِي
    type: pronoun
    gender: male
    translations:
      - dialect: msa
        source: hw4
        url: http://ejtaal.net/aa/#hw4=41
        text:
          - (relative pronoun) he who, that which
    derived:
      - text: اَلَّتِي
        derivation: feminine

  - gender: male-or-female
    text: أَنَا
    type: pronoun
    translations:
      - dialect: msa
        source: hw4
        source-page: 37
        text:
          - I
    derived:
      - derivation: nisba
        type: adjective
        text: أَنَانِيّ
        translations:
          - dialect: msa
            source: hw4
            source-page: 37
            text:
              - egoistic
              - egoistic(al), selfish

  - text: أَيّ
    type: pronoun
    gender: male
    translations:
      - dialect: msa
        source: hw4
        source-page: 46
        text:
          - (with foll. genit. or suffix) which? what? what kind of? whoever, whosoever
          - any, every, no matter what...
    derived:
      - derivation: extension
        text: أَيُّهَا
        type: particle
        translations:
          - dialect: msa
            source: hw4
            source-page: 48
            text:
              - (vocative part., with article before the foll. noun) O...!

  - text: ذَا
    type: pronoun
    gender: male
    derived:
      - derivation: extension
        text: ذَاكَ
        type: pronoun
        gender: male
        translations:
          - dialect: msa
            source: hw4
            source-page: 354
            text:
              - this, this one

      - derivation: colloquial
        text: دَه
        type: pronoun
        gender: male
        translations:
          - dialect: eg
            source: wiktionary
            url: https://en.wiktionary.org/wiki/%D8%AF%D9%87#Egyptian_Arabic
            text:
              - this, that
        derived:
          - derivation: feminine
            text: دي

          - derivation: plural
            text: دول
            translations:
              - dialect: eg
                source: free-text
                url: https://en.wiktionary.org/wiki/%D8%AF%D9%88%D9%84
                text:
                  - those, these

  - text: كِلَا
    type: pronoun
    gender: male
    translations:
      - dialect: msa
        source: hw4
        url: http://ejtaal.net/aa/#hw4=990
        text:
          - "(with foll. noun in genit. du. uninflected; with foll. pron. suffix inflected: obl. كلي, f. كلتي) both of"

