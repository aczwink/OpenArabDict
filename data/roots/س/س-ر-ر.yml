root:
  radicals: س-ر-ر
  words:
    - type: verb
      form:
        stem: 1
        variants:
          - dialect: msa
            parameters: au
      translations:
        - dialect: msa
          source: hw4
          source-page: 471
          text:
            - to make happy, gladden, delight, cheer (ه s.o.)
            - pass. to be happy, glad, delighted (ل or من or ب at), take pleasure (ل or من or ب in)
      derived:
        - derivation: verbal-noun
          text: سُرُور
          translations:
            - dialect: msa
              source: hw4
              source-page: 471
              text:
                - joy, happiness, delight, pleasure

        - derivation: passive-participle
          type: adjective
          gender: male
          translations:
            - complete: true
              dialect: msa
              source: hw4
              source-page: 472
              text:
                - glad, happy, delighted (ب at), pleased (ب with)

    - text: سِرّ
      type: noun
      translations:
        - dialect: msa
          source: hw4
          source-page: 471
          text:
            - secret

    - text: سُرَّة
      type: noun
      translations:
        - dialect: msa
          source: hw4
          source-page: 471
          text:
            - navel, umbilicus

    - text: سَرِير
      type: noun
      translations:
        - dialect: msa
          source: hw4
          source-page: 471
          text:
            - bedstead, bed
