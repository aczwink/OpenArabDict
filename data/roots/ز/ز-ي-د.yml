root:
  radicals: ز-ي-د
  words:
    - type: verb
      form:
        stem: 1
        variants:
          - dialect: msa
            parameters: ii
          - dialect: lb
            parameters: ii
      translations:
        - dialect: msa
          source: hw4-free-text
          text:
            - >-
              1. to become greater, become more, grow, increase, be compounded,
              multiply

              2. to be greater, be more, amount to more (عن or على than), exceed
              (عن or على s.th., an amount, ب by), go beyond an amount of number
              (على)
        - dialect: lb
          source: lav
          source-page: 122
          text:
            - increase (intr.)
            - add (tr.)
      derived:
        - derivation: active-participle
          type: adjective
          gender: male
          translations:
            - dialect: msa
              source: hw4
              source-page: 453
              text:
                - increasing, growing
          derived:
            - derivation: feminine
              text: زَائِدَة
              type: noun
              translations:
                - dialect: msa
                  source: hw4
                  source-page: 453
                  text:
                    - appendage, appendix (anat., zool. bot.)

        - derivation: passive-participle
          type: adjective
          translations:
            - dialect: msa
              source: hw4
              source-page: 452
              text:
                - increased, etc.

        - derivation: passive-participle
          type: noun
          translations:
            - dialect: msa
              source: hw4
              source-page: 452
              text:
                - an exceeding (على of s.th.)
                - excess, superabundance

        - text: زِيَادَة
          derivation: verbal-noun
          type: noun
          gender: female
          translations:
            - dialect: msa
              source: hw4-free-text
              text:
                - surplus, overplus, excess
    - type: verb
      dialect: msa
      form: 8
      translations:
        - dialect: msa
          source: hw4-free-text
          text:
            - to grow, be growing, increase, be compounded, multiply
      derived:
        - text: اِزْدِيَاد
          derivation: verbal-noun
          type: noun
          gender: male
          translations:
            - dialect: msa
              source: hw4-free-text
              text:
                - increase, growth, rise, intensification
