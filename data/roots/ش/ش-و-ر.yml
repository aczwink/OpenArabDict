root:
  radicals: ش-و-ر
  words:
    - type: verb
      dialect: msa
      form: 4
      translations:
        - dialect: msa
          source: hw4-free-text
          text:
            - to point, allude (إلى to), hint (إلى at), indicate, point out (على
              or إلى s.th.), call s.o.'s (ل) attention to (على)
      derived:
        - text: إِشَارَة
          derivation: verbal-noun
          type: noun
          gender: female
          translations:
            - dialect: msa
              source: hw4-free-text
              text:
                - sign, motion, nod, wink, wave

    - type: verb
      form: 5
      translations:
        - complete: true
          dialect: lb
          source: hw4
          source-page: 575
          text:
            - to walk
      derived:
        - text: مِشْوَار
          derivation: meaning-related
          type: noun
          translations:
            - dialect: southlevant
              source: wiktionary
              url: https://en.wiktionary.org/wiki/%D9%85%D8%B4%D9%88%D8%A7%D8%B1#South_Levantine_Arabic
              text:
                - excursion, walk, errand

    - type: verb
      form:
        stem: 10
        valency: transitive
      translations:
        - complete: true
          dialect: msa
          source: hw4
          source-page: 575
          text:
            - to ask for advice (ه s.o.), take counsel (ه with s.o.), consult (ه s.o.)
        - dialect: lb
          source: lav
          source-page: 132
          text:
            - consult
      derived:
        - derivation: verbal-noun
          translations:
            - dialect: msa
              source: hw4-free-text
              text:
                - a seeking of advice, consultation
        - derivation: passive-participle
          type: noun
          gender: male
          translations:
            - dialect: msa
              source: hw4
              source-page: 576
              text:
                - adviser, counselor, consultant, councilor