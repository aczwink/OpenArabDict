root:
  radicals: ش-ر-ك
  words:
    - type: verb
      form:
        stem: 1
        valency: transitive
        variants:
          - dialect: msa
            parameters: ia
      translations:
        - complete: true
          dialect: msa
          source: hw4
          source-page: 547
          text:
            - to share (ه في with s.o. s.th.), participate (ه في with s.o. in), be or become partner, participant, associate (ه في of s.o. in)
      derived:
        - derivation: verbal-noun
          type: noun
          text: شِرْكَة
          translations:
            - dialect: msa
              source: hw4
              source-page: 547
              text:
                - partnership

        - text: شَرِكَة
          derivation: verbal-noun
          type: noun
          gender: female
          translations:
            - dialect: msa
              source: hw4-free-text
              text:
                - company, corporation (com.)
          derived:
            - text: شَرِكَات
              derivation: plural

        - derivation: meaning-related
          text: شَرِيك
          type: noun
          translations:
            - dialect: msa
              source: hw4
              source-page: 547
              text:
                - sharer, participant, partner, copartner
              
    - type: verb
      dialect: msa
      form: 3
      translations:
        - dialect: msa
          source: hw4-free-text
          text:
            - >-
              1. to take part (في in an event)

              2. to share (ه ه or في with s.o. s.th.), participate (في or ه ه
              with s.o. in), be or become a partner, participant, associate (في
              or ه ه of s.o. in)
      derived:
        - text: مُشَارَكَة
          derivation: verbal-noun
          type: noun
          gender: female
          translations:
            - dialect: msa
              source: hw4-free-text
              text:
                - |-
                  1. partnership, copartnership, participation (في in)
                  2. cooperation, collaboration

    - form: 4
      type: verb
      translations:
        - dialect: msa
          source: hw4
          source-page: 547
          text:
            - to make (ه s.o.) a partner, participant, associate (في in), give (ه s.o.) a share (في in), have (ه s.o.) share (في in)

    - type: verb
      form: 8
      translations:
        - dialect: msa
          source: hw4
          source-page: 547
          text:
            - to participate (مع في with s.o. in), share (مع في with s.o., s.th.), collaborate, take part (في in), contribute (في to)
        - dialect: lb
          source: lav
          source-page: 131
          text:
            - join, participate in بِ
      derived:
        - derivation: passive-participle
          type: adjective
          translations:
            - dialect: msa
              source: hw4
              source-page: 548
              text:
                - common, joint, combined, concurrent, collective, co-
