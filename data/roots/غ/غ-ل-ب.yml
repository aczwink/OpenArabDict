root:
  radicals: غ-ل-ب
  words:
    - type: verb
      form:
        stem: 1
        variants:
          - dialect: msa
            parameters: ai
          - dialect: lb
            parameters: aisu
      translations:
        - dialect: msa
          source: hw4-free-text
          text:
            - to subdue, conquer, vanquish, defeat, beat, lick (على or ه, s.o.,
              s.th.), get the better (على or ه, of s.o., of s.th.), be
              victorious, triumph, gain ascendancy, get the upperhand, achieve
              supremacy (على or ه, over s.o., over s.th.)
        - dialect: lb
          source: lav
          source-page: 120
          text:
            - beat, defeat
      derived:
        - derivation: passive-participle
          gender: male
          type: adjective
          translations:
            - dialect: msa
              source: hw4
              source-page: 796
              text:
                - defeated, vanquished
                - beaten

    - form: 5
      type: verb
      translations:
        - dialect: msa
          source: hw4
          source-page: 796
          text:
            - to triumph, gain the mastery (على over), overcome, surmount, master (على s.th.), cope (على with), break (على a resistance)
      derived:
        - derivation: verbal-noun
          translations:
            - complete: true
              dialect: msa
              source: hw4
              source-page: 796
              text:
                - surmounting, overcoming, mastery (على of s.th.)