              - to carry out a military expedition, make a raid, foray, or incursion, commit aggression (ه ,ه against s.o., against s.th.), attack, assault (ه ,ه s.o., s.th.), raid, invade (ه s.th.)
              - to conquer (ه s.th., ه s.o.)
