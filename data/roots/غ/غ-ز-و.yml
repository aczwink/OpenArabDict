              text: غَزْو
              translations:
                - dialect: msa
                  source: hw4
                  source-page: 788
                  text:
                    - assault, raid, incursion, inroad, invasion, attack, aggression

            - text: غَزْوَة
              derivation: meaning-related
              type: noun
              translations:
                - dialect: msa
                  source: hw4
                  source-page: 788
                  text:
                    - military expedition, foray
                    - raid, incursion, inroad, invasion, attack, aggression
                    - conquest
                    - campaign of conquest
              derived:
                - text: غَزَوَات
                  derivation: plural