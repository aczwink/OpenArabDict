root:
  radicals: ث-و-ر
  words:
    - type: verb
      form: 4
      translations:
        - dialect: msa
          source: hw4
          url: http://ejtaal.net/aa/#hw4=143
          text:
            - to arouse, stir up, kindle, excite (ه s.th., e.g., feelings), cause, provoke, awaken (ه s.th.)
      derived:
        - derivation: verbal-noun
          translations:
            - dialect: msa
              source: hw4
              source-page: 131
              text:
                - excitation, stirring up, kindling

        - derivation: active-participle
          type: adjective
          translations:
            - dialect: msa
              source: hw4
              source-page: 131
              text:
                - exciting
                - excitant, irritant, stimulant

    - text: ثَوْر
      type: noun
      translations:
        - dialect: msa
          source: hw4
          source-page: 130
          text:
            - bull, steer
            - ox
      derived:
        - derivation: plural
          text: ثِيرَان

        - text: ثَوْرَة
          derivation: feminine
          translations:
            - dialect: msa
              source: hw4
              source-page: 130
              text:
                - outbreak, outburst, fit (of fury, of despair, etc.)
                - revolution
