root:
  radicals: م-ن-ع
  words:
    - type: verb
      form:
        stem: 1
        variants:
          - dialect: msa
            parameters: aa
          - dialect: lb
            parameters: aa
      translations:
        - dialect: msa
          source: hw4
          source-page: 1087
          text:
            - to hinder, prevent (ه s.th.; من or ه عن s.o. from), keep, restrain, hold back (ه s.o. من or عن from)
        - dialect: lb
          source: lav
          source-page: 119
          text:
            - forbid
      derived:
        - text: مَناعة
          derivation: meaning-related
          type: noun
          gender: female
          translations:
            - dialect: msa
              source: hw4-free-text
              text:
                - immunity (to a disease, also dipl.)
        - derivation: passive-participle
          type: adjective
          gender: male
          translations:
            - dialect: msa
              source: hw4-free-text
              text:
                - forbidden, prohibited, banned, interdicted
          derived:
            - text: مَمْنُوعَة
              derivation: feminine
              type: adjective
              gender: female

        - text: مَنِيع
          derivation: meaning-related
          type: adjective
          gender: male
          translations:
            - dialect: msa
              source: hw4-free-text
              text:
                - well-fortified

    - form: 3
      type: verb
      translations:
        - dialect: msa
          source: hw4
          source-page: 1087
          text:
            - to refuse, deny (ه ه s.o. s.th.)

    - type: verb
      dialect: msa
      form: 8
      translations:
        - dialect: msa
          source: hw4-free-text
          text:
            - to refrain, abstain, keep (عن from doing s.th.), forbear (عن
              s.th.), stop, cease (عن doing s.th.)
