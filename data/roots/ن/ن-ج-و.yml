root:
  radicals: ن-ج-و
  words:
    - form:
        stem: 1
        variants:
          - dialect: msa
            parameters: au
      type: verb
      translations:
        - dialect: msa
          source: hw4
          source-page: 1110
          text:
            - to save o.s., be saved, be rescued, make for safety, get away (من from), escape (من s.th.), be delivered (من from)
          usage:
            - text: نجا بحياته
              translation: to save one's life, save one's skin
              type: example
      derived:
        - derivation: verbal-noun
          text: نَجَاة
          translations:
            - dialect: msa
              source: hw4
              source-page: 1110
              text:
                - deliverance, rescue