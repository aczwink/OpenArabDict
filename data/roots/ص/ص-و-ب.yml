root:
  radicals: ص-و-ب
  words:
    - type: verb
      form:
        stem: 1
        variants:
          - dialect: msa
            parameters: uu
          - dialect: lb
            parameters: ii
      translations:
        - dialect: msa
          source: hw4
          source-page: 617
          text:
            - to be right, hold true, be to the point, hit the mark, be pertinent, be apposite (opinion)
        - dialect: lb
          source: lav
          source-page: 122
          text:
            - hit (a target)
            - afflict
      derived:
        - derivation: active-participle
          type: adjective
          translations:
            - dialect: msa
              source: hw4
              source-page: 618
              text:
                - pertinent, apropos, apposite, right, correct
    
    - type: verb
      dialect: msa
      form: 2
      translations:
        - dialect: msa
          source: hw4
          url: ejtaal.net/aa/#hw4=630
          text:
            - to direct, fix (ه إلى s.th., also, e.g., the glance on, to), aim, point, train (ه إلى s.th. at or on)

    - type: verb
      form: 4
      translations:
        - dialect: msa
          source: hw4-free-text
          text:
            - |-
              1. to wound, injure (ه s.o.)
              2. to befall (ه s.o.), fall (ه upon s.o.), happen (ه to s.o.)
      derived:
        - derivation: verbal-noun
          translations:
            - dialect: msa
              source: hw4
              source-page: 618
              text:
                - hit
                - injury, wound

        - derivation: active-participle
          type: adjective
          derived:
            - text: مُصِيبَة
              derivation: feminine
              type: noun
              translations:
                - dialect: msa
                  source: hw4
                  source-page: 618
                  text:
                    - misfortune, calamity, disaster

        - derivation: passive-participle
          pos:
            - type: adjective
              translations:
                - dialect: msa
                  source: hw4
                  source-page: 618
                  text:
                    - injured, wounded, sick, ill
                    
            - type: noun
              translations:
                - dialect: msa
                  source: hw4
                  source-page: 618
                  text:
                    - wounded person, casualty
                    - victim of an accident

    - text: صَوَاب
      type: noun
      gender: male
      translations:
        - dialect: msa
          source: hw4
          source-page: 617
          text:
            - that which is right, proper, or correct
            - right, proper, correct

    - text: صَوْبَ
      type: preposition
      translations:
        - dialect: msa
          source: hw4
          url: http://ejtaal.net/aa/#hw4=630
          text:
            - in the direction of, toward, to