root:
  radicals: ك-و-ن
  words:
    - type: verb
      form:
        stem: 1
        variants:
          - dialect: msa
            parameters: uu
          - dialect: lb
            parameters: iu #"Levantine Arabic Verbs: Conjugation Tables and Grammar" by "Aldrich, M. and Choucaire, N.L.", ISBN: 9780998641133; Table: 76A
      translations:
        - dialect: msa
          source: hw4-free-text
          text:
            - to be
        - dialect: lb
          source: lav
          source-page: 123
          text:
            - be, am, is, are, was, were
      derived:
        - text: مَكَان
          derivation: meaning-related
          type: noun
          gender: male
          translations:
            - dialect: msa
              source: hw4-free-text
              text:
                - place, site, spot, location
          derived:
            - text: أَمَاكِن
              derivation: plural

    - type: verb
      form: 2
      derived:
        - derivation: verbal-noun
          translations:
            - dialect: msa
              source: hw4
              source-page: 994
              text:
                - forming, shaping, formation, creation, origination
                
        - derivation: active-participle
          type: noun
          gender: male
          translations:
            - dialect: msa
              source: hw4
              source-page: 995
              text:
                - component
                - formative, constituent (also gram.)
          derived:
            - text: مُكَوِّنَات
              derivation: plural

    - text: كَوْن
      type: noun
      translations:
        - dialect: msa
          source: hw4
          source-page: 994
          text:
            - existence
          usage:
            - text: الكون
              translation: the existent, the existing, reality; the world; the cosmos, the universe
              type: meaning-in-context
      derived:
        - text: كَوْنِيّ
          derivation: nisba
          type: adjective
          gender: male
          translations:
            - dialect: msa
              source: hw4
              url: http://ejtaal.net/aa/#hw4=1007
              text:
                - cosmic, cosmo- (in compounds)
              examples:
                - text: الفلسفة الكونية
                  translation: cosmology