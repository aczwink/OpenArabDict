root:
  radicals: ك-ت-ب
  words:
    - type: verb
      form:
        stem: 1
        variants:
          - dialect: msa
            parameters: au
          - dialect: lb
            parameters: aisu
      translations:
        - dialect: msa
          source: hw4
          source-page: 951
          text:
            - to write, pen, write down, put down in writing, note down, inscribe, enter, record, book, register (ه s.th.)
        - dialect: lb
          source: free-text #"Levantine Arabic Verbs: Conjugation Tables and Grammar" by "Aldrich, M. and Choucaire, N.L.", ISBN: 9780998641133; Table: 77
          text:
            - to write
      derived:
        - text: كِتَاب
          derivation: meaning-related
          type: noun
          translations:
            - dialect: msa
              source: hw4
              source-page: 951
              text:
                - book
          derived:
            - text: كُتُب
              derivation: plural

        - text: مَكْتَب
          derivation: noun-of-place
          translations:
            - dialect: msa
              source: hw4
              source-page: 952
              text:
                - office
          derived:
            - derivation: feminine
              text: مَكْتَبَة
              translations:
                - dialect: msa
                  source: hw4
                  source-page: 952
                  text:
                    - library
              derived:
                - text: مَكْتَبَات
                  derivation: plural

        - derivation: active-participle
          id: kaatib
          type: noun
          translations:
            - dialect: msa
              source: hw4
              source-page: 952
              text:
                - writer
          derived:
            - text: كُتَّاب
              derivation: plural

        - derivation: passive-participle
          type: noun
          translations:
            - dialect: msa
              source: hw4
              source-page: 952
              text:
                - a writing, message, note
          derived:
            - derivation: plural
              text: مَكَاتِيب