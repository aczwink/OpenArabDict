root:
  radicals: ع-ر-ف
  words:
    - type: verb
      form:
        stem: 1
        variants:
          - dialect: msa
            parameters: ai
          - dialect: lb
            parameters: ii #"Levantine Arabic Verbs: Conjugation Tables and Grammar" by "Aldrich, M. and Choucaire, N.L.", ISBN: 9780998641133; Table: 59
      translations:
        - dialect: msa
          source: hw4
          source-page: 708
          text:
            - to know (ه ,ه s.o., s.th.)
            - to get to know, come to know (ه s.o.)
        - dialect: lb
          source: lav
          source-page: 59
          text:
            - to know
      derived:
        - text: مَعْرِفَة
          derivation: verbal-noun
          type: noun
          gender: female
          translations:
            - dialect: msa
              source: hw4
              url: http://ejtaal.net/aa/#hw4=722
              text:
                - knowledge, learning, lore, information, skill, know-how
        - derivation: active-participle
          type: adjective
          gender: male
          translations:
            - dialect: msa
              source: hw4-free-text
              text:
                - acquainted, conversant, familiar (ب with)
        - derivation: passive-participle
          type: noun
          gender: male
          translations:
            - dialect: msa
              source: hw4
              url: https://ejtaal.net/aa/#hw4=723
              text:
                - favor rendered, courtesy, mark of friendship

    - type: verb
      form: 2
      translations:
        - dialect: msa
          source: hw4
          source-page: 708
          text:
            - to introduce (إلى or ه ب s.o. to s.o. else), present (ب or ب إلى ,ه إلى s.o. to s.o. else)
        - dialect: lb
          source: lav
          source-page: 126
          text:
            - introduce (someone to على)
      derived:
        - text: تَعْرِيف
          derivation: verbal-noun
          type: noun
          gender: male
          translations:
            - dialect: msa
              source: hw4-free-text
              text:
                - definition, determination, identification, specification,
                  characterization
          derived:
            - text: تَعْرِيفَات
              derivation: plural
              type: noun
              gender: male
              translations: []

    - type: verb
      form: 5
      translations:
        - dialect: lb
          source: lav
          source-page: 129
          text:
            - meet, be acquainted with
      derived:
        - text: تَعَرُّف
          derivation: verbal-noun
          type: noun
          gender: male
          translations:
            - dialect: msa
              source: hw4-free-text
              text:
                - cognition, knowledge, perception, realization

    - type: verb
      form: 8
      translations:
        - dialect: msa
          source: hw4
          source-page: 708
          text:
            - to confess, admin, acknowledge, own, avow (ه s.th.)
            - to recognize (ب s.o., s.th., a state, pol), grant recognition (ب to s.o., to s.th.)
        - dialect: lb
          source: lav
          source-page: 131
          text:
            - admit to, confess
            
    - text: عَرَّاف
      type: noun
      gender: male
      translations:
        - complete: true
          dialect: msa
          source: hw4
          url: http://ejtaal.net/aa/#hw4=722
          text:
            - diviner, fortuneteller