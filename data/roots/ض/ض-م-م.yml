root:
  radicals: ض-م-م
  words:
    - type: verb
      form:
        stem: 1
        variants:
          - dialect: msa
            parameters: au
          - dialect: lb
            parameters: au
      translations:
        - dialect: msa
          source: hw4-free-text
          text:
            - >-
              1. to bring together, join, draw together, contract (ه s.th.)

              2. to unite, bring together (هم persons)

              3. to embrace, hug (ه s.o.)

              4. to join, subjoin, annex (إلى ه s.th. to), add (إلى ه s.o.,
              s.th. to), unite(إلى ه s.o., s.th. with)

              5. to grasp, grip, grab, seize (على s.o., s.th.)
        - dialect: lb
          source: lav
          source-page: 125
          text:
            - embrace
            - bring together

    - type: verb
      form: 7
      translations:
        - dialect: msa
          source: hw4
          source-page: 636
          text:
            - to be joined, united, or combined (إلى with), unite, join forces (إلى with)
            - to associate, affiliate (الى with)
            - to enter, join (الى an organization, and the like)
        - dialect: lb
          source: lav
          source-page: 88
          text:
            - to join