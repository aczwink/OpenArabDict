root:
  radicals: و-د-ع
  words:
    - type: verb
      form:
        stem: 1
        variants:
          - dialect: msa
            parameters: aa
      translations:
        - dialect: msa
          source: hw4
          source-page: 1240
          text:
            - (usually only in imperf. and imp.) to let, leave
      derived:
        - text: دَعْنَا
          derivation: meaning-related
          type: phrase
          translations:
            - dialect: msa
              source: hw4-free-text
              text:
                - let us
          derived:
            - text: دَعْنَا نَذْهَب
              derivation: extension
              type: phrase
              translations:
                - dialect: msa
                  source: hw4-free-text
                  text:
                    - let us go!

    - type: verb
      form: 2
      translations:
        - dialect: msa
          source: hw4
          source-page: 1240
          text:
            - to take leave (ه of), say farewell (ه to s.o.)
        - dialect: lb
          source: lav
          source-page: 126
          text:
            - bid farewell
      derived:
        - text: وَدَاع
          derivation: meaning-related
          type: noun
          translations:
            - dialect: msa
              source: hw4
              source-page: 1241
              text:
                - farewell, leave-taking, adieu, valediction
          derived:
            - derivation: adverbial-accusative
              translations:
                - dialect: msa
                  source: hw4
                  source-page: 1241
                  text:
                    - farewell! adieu! God be with you! good-by!